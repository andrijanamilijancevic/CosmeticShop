<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>💄 Kreirajte nalog</h2>
      <p>Pridružite se GlamShop zajednici</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Ime</label>
          <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="Vaše ime" required/>
        </div>
        <div class="form-group">
          <label>Prezime</label>
          <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Vaše prezime" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="vas@email.com" required/>
      </div>

      <div class="form-group">
        <label>Lozinka</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required/>
      </div>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Registracija...' : 'Registrujte se' }}
      </button>
    </form>

    <p class="auth-footer">
      Već imate nalog? <a routerLink="/login">Prijavite se</a>
    </p>
  </div>
</div>
