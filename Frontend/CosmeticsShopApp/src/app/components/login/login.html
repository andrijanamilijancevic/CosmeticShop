<div class="auth-page">
  <div class="auth-split-container">
    
    <!-- Left Column: Full bleed visual storytelling -->
    <div class="auth-visual-side" style="background-image: url('/image_22.jpg')">
      <div class="visual-tint"></div>
      <div class="visual-quote">
        <span class="quote-tag">GLAM SHOP</span>
        <p class="quote-text">"Lepota počinje onog trenutka kada odlučite da budete ono što jeste."</p>
      </div>
    </div>

    <!-- Right Column: Form side -->
    <div class="auth-form-side">
      <div class="form-wrapper">
        <div class="auth-header">
          <div class="logo-wrapper">
            <img src="/logo.png" alt="GlamShop Logo" class="auth-logo" />
          </div>
          <h2>Dobrodošli nazad</h2>
          <p>Prijavite se na svoj nalog</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="premium-form">
          <div class="form-group-premium">
            <input 
              type="email" 
              [(ngModel)]="email" 
              name="email" 
              id="login-email"
              placeholder="vas@email.com" 
              required
              class="premium-input"
            />
            <label for="login-email" class="premium-label">Email</label>
          </div>

          <div class="form-group-premium">
            <input 
              type="password" 
              [(ngModel)]="password" 
              name="password" 
              id="login-password"
              placeholder="••••••••" 
              required
              class="premium-input"
            />
            <label for="login-password" class="premium-label">Lozinka</label>
          </div>

          @if (errorMsg) {
            <div class="error-msg animate-fade">{{ errorMsg }}</div>
          }

          <button type="submit" class="btn-auth-submit" [disabled]="loading">
            {{ loading ? 'Prijavljivanje...' : 'Prijava' }}
          </button>
        </form>

        <p class="auth-footer">
          Nemate nalog? <a routerLink="/register">Registrujte se</a>
        </p>
      </div>
    </div>

  </div>
</div>
